<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나를 맞혀봐!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Pretendard:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-bg"></div>
  <main class="app-shell">
    <header class="hero">
      <p class="eyebrow">INTERACTIVE INTRO GAME</p>
      <h1>나를 맞혀봐!</h1>
      <p class="hero-text">
        나에 대한 객관식 퀴즈를 풀고, 마지막에는 메모리 게임까지 도전하는 자기소개 게임 사이트예요.
        얼마나 잘 맞히는지 점수로 확인해보세요!
      </p>
    </header>

    <section class="game-layout">
      <section class="quiz-panel card-panel">
        <div class="panel-top">
          <div>
            <p class="panel-label">QUIZ STAGE</p>
            <h2>객관식 퀴즈</h2>
          </div>
          <div class="status-box">
            <span id="progressText">1 / 4</span>
          </div>
        </div>

        <div id="quizScreen" class="quiz-screen">
          <div class="question-card animate-pop">
            <p class="question-number" id="questionNumber">QUESTION 1</p>
            <h3 id="questionText">문제를 불러오는 중...</h3>
            <div id="choices" class="choices"></div>
            <button id="nextButton" class="pixel-button" disabled>다음 문제</button>
          </div>
        </div>

        <div id="resultScreen" class="result-screen hidden">
          <div class="result-badge">RESULT</div>
          <h3>퀴즈 완료!</h3>
          <p id="scoreText" class="score-text"></p>
          <p id="scoreMessage" class="score-message"></p>
          <button id="restartQuizButton" class="pixel-button secondary">퀴즈 다시하기</button>
        </div>
      </section>

      <section class="memory-panel card-panel">
        <div class="panel-top">
          <div>
            <p class="panel-label">BONUS STAGE</p>
            <h2>메모리 게임</h2>
          </div>
          <div class="status-box">
            <span id="memoryMoves">이동 0회</span>
          </div>
        </div>

        <p class="memory-guide">같은 그림 카드를 찾아 4쌍을 모두 맞혀보세요.</p>
        <div id="memoryGrid" class="memory-grid"></div>
        <div class="memory-actions">
          <p id="memoryStatus" class="memory-status">카드를 뒤집어 시작해보세요!</p>
          <button id="restartMemoryButton" class="pixel-button secondary">메모리 게임 다시하기</button>
        </div>
      </section>
    </section>
  </main>

  <div id="feedbackModal" class="modal hidden" aria-hidden="true">
    <div class="modal-card">
      <div id="modalIcon" class="modal-icon">O</div>
      <h3 id="modalTitle">정답!</h3>
      <p id="modalText">잘 맞혔어요.</p>
      <button id="closeModalButton" class="pixel-button">계속하기</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
